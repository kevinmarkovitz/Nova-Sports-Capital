<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Capital Edge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #f8fafc; /* slate-50 */
        --bg-secondary: #e2e8f0; /* slate-200 */
        --bg-tertiary: #f1f5f9; /* slate-100 */
        --text-primary: #0f172a; /* slate-900 */
        --text-secondary: #334155; /* slate-700 */
        --border-primary: #cbd5e1; /* slate-300 */
        --accent-red: #dc2626; /* red-600 */
        --accent-blue: #2563eb; /* blue-600 */
      }

      html[data-theme="dark"] {
        --bg-primary: #0f172a; /* slate-900 */
        --bg-secondary: #1e293b; /* slate-800 */
        --bg-tertiary: #334155; /* slate-700 */
        --text-primary: #f1f5f9; /* slate-100 */
        --text-secondary: #94a3b8; /* slate-400 */
        --border-primary: #334155; /* slate-700 */
        --accent-red: #ef4444; /* red-500 */
        --accent-blue: #3b82f6; /* blue-500 */
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-secondary);
      }

      .main-container {
        background-color: var(--bg-secondary);
        border: 1px solid var(--border-primary);
      }

      .text-main-primary {
        color: var(--text-primary);
      }
      .text-main-secondary {
        color: var(--text-secondary);
      }
      .text-accent-red {
        color: var(--accent-red);
      }
      .text-accent-blue {
        color: var(--accent-blue);
      }

      .input-group input,
      .input-group select {
        background-color: var(--bg-tertiary);
        color: var(--text-primary);
        border-color: var(--border-primary);
        @apply w-full rounded-md p-2 placeholder-slate-500 focus:outline-none focus:ring-2 transition;
      }

      .game-card {
        background-color: var(--bg-tertiary);
        border: 1px solid var(--border-primary);
        transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
      }
      .game-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }
      .positive-edge {
        background: linear-gradient(
          to right,
          rgba(22, 163, 74, 0.1),
          transparent
        );
        border-left: 4px solid #16a34a;
      }
      .watchlist-star.active svg {
        fill: #facc15; /* yellow-400 */
        color: #facc15;
      }
      .btn {
        @apply px-4 py-2 rounded-md font-semibold text-white transition;
      }
      .btn-sm {
        @apply px-2 py-1 text-xs;
      }
      .btn-primary {
        background-color: var(--accent-red);
      }
      .btn-primary:hover {
        filter: brightness(1.1);
      }
      .btn-secondary {
        background-color: var(--bg-tertiary);
        color: var(--text-primary);
        border: 1px solid var(--border-primary);
      }
      .btn-secondary:hover {
        filter: brightness(0.9);
      }
      .btn-success {
        @apply bg-green-600 hover:bg-green-700;
      }
      .btn-danger {
        @apply bg-red-600 hover:bg-red-700;
      }
      .modal-overlay {
        background-color: rgba(0, 0, 0, 0.7);
        @apply fixed inset-0 z-40 flex items-center justify-center;
      }
      .modal-content {
        background-color: var(--bg-secondary);
        @apply p-6 rounded-lg shadow-xl w-full max-w-md;
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-6xl mx-auto">
      <div class="main-container backdrop-blur-sm p-8 rounded-2xl shadow-2xl">
        <div class="flex justify-between items-center mb-6">
          <div class="flex items-center">
            <svg
              width="60"
              height="60"
              viewBox="0 0 104 90"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M26 0L0 45L26 90H78L104 45L78 0H26Z" fill="#263959" />
              <path d="M78 0L52 45L78 90H26L52 45L26 0H78Z" fill="#E53B3A" />
            </svg>
            <div class="ml-4 text-left">
              <h1
                class="text-2xl md:text-3xl font-bold text-main-primary tracking-wider"
              >
                NOVA
              </h1>
              <p class="text-xs md:text-sm text-main-secondary tracking-widest">
                SPORTS CAPITAL
              </p>
            </div>
          </div>
          <button
            id="theme-toggle"
            class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-800 focus:ring-white"
          >
            <svg
              id="theme-icon-sun"
              class="h-6 w-6 text-main-secondary hidden"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
              ></path>
            </svg>
            <svg
              id="theme-icon-moon"
              class="h-6 w-6 text-main-secondary"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
              ></path>
            </svg>
          </button>
        </div>

        <!-- Main Navigation Tabs -->
        <div class="border-b border-border-primary mb-6">
          <nav class="-mb-px flex space-x-8" aria-label="Tabs">
            <button
              id="tab-dashboard"
              class="tab-btn border-accent-red text-accent-red whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm"
              data-view="dashboard-view"
            >
              Dashboard
            </button>
            <button
              id="tab-tracker"
              class="tab-btn border-transparent text-main-secondary hover:text-main-primary hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm"
              data-view="tracker-view"
            >
              My Tracker
            </button>
            <button
              id="tab-system"
              class="tab-btn border-transparent text-main-secondary hover:text-main-primary hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm"
              data-view="system-tracker-view"
            >
              System Performance
            </button>
          </nav>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view">
          <div
            class="flex flex-col md:flex-row justify-between items-center mb-8"
          >
            <h2 class="text-2xl font-bold text-main-primary">
              The Capital Edge
            </h2>
            <div
              class="flex items-end gap-x-6 gap-y-4 mt-4 md:mt-0 flex-wrap justify-center"
            >
              <div class="flex items-end gap-4">
                <div class="input-group">
                  <label
                    for="global-bankroll"
                    class="block text-sm font-medium mb-1 text-main-secondary"
                    >Default Bankroll ($)</label
                  >
                  <input type="number" id="global-bankroll" value="1000" />
                </div>
                <div class="input-group">
                  <label
                    for="global-kelly-multiplier"
                    class="block text-sm font-medium mb-1 text-main-secondary"
                    >Kelly Multiplier</label
                  >
                  <input
                    type="number"
                    id="global-kelly-multiplier"
                    value="1.0"
                    step="0.1"
                  />
                </div>
              </div>
              <div class="flex items-end gap-4">
                <div class="input-group">
                  <label
                    for="sport-filter"
                    class="text-main-secondary font-medium mb-1 block"
                    >Sport:</label
                  >
                  <select id="sport-filter"></select>
                </div>
                <div class="input-group">
                  <label
                    for="market-type-filter"
                    class="text-main-secondary font-medium mb-1 block"
                    >Market:</label
                  >
                  <select id="market-type-filter">
                    <option value="moneyline">Moneyline</option>
                    <option value="spreads">Spreads</option>
                    <option value="totals">Totals</option>
                    <optgroup label="WNBA Props">
                      <option value="player_points">Points</option>
                      <option value="player_rebounds">Rebounds</option>
                      <option value="player_assists">Assists</option>
                    </optgroup>
                    <optgroup label="MLB Props">
                      <option value="pitcher_strikeouts">
                        Pitcher Strikeouts
                      </option>
                      <option value="batter_home_runs">Batter Home Runs</option>
                      <option value="batter_hits">Batter Hits</option>
                      <option value="batter_total_bases">
                        Batter Total Bases
                      </option>
                      <option value="batter_rbis">Batter RBIs</option>
                      <option value="batter_runs_scored">
                        Batter Runs Scored
                      </option>
                      <option value="batter_hits_runs_rbis">
                        Batter Hits+Runs+RBIs
                      </option>
                      <option value="batter_strikeouts">
                        Batter Strikeouts
                      </option>
                      <option value="pitcher_hits_allowed">
                        Pitcher Hits Allowed
                      </option>
                      <option value="pitcher_walks">Pitcher Walks</option>
                      <option value="pitcher_earned_runs">
                        Pitcher Earned Runs
                      </option>
                    </optgroup>
                  </select>
                </div>
                <div class="input-group">
                  <label
                    for="sort-by"
                    class="text-main-secondary font-medium mb-1 block"
                    >Sort By:</label
                  >
                  <select id="sort-by">
                    <option value="time">Game Time</option>
                    <option value="edge">Highest Edge</option>
                  </select>
                </div>
                <div class="flex items-center space-x-2 pt-2">
                  <input
                    type="checkbox"
                    id="watchlist-toggle"
                    class="h-4 w-4 rounded border-border-primary text-accent-red focus:ring-accent-red"
                  />
                  <label
                    for="watchlist-toggle"
                    class="text-main-secondary font-medium"
                    >Starred Games</label
                  >
                </div>
              </div>
            </div>
          </div>

          <div
            id="game-slate"
            class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6"
          ></div>
          <div id="loading-spinner" class="text-center py-12 hidden">
            <svg
              class="animate-spin h-8 w-8 text-accent-red mx-auto"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <p class="mt-4 text-main-secondary">Loading Games...</p>
          </div>
        </div>

        <!-- My Performance Tracker View -->
        <div id="tracker-view" class="view hidden">
          <h2 class="text-2xl font-bold text-main-primary text-center mb-4">
            My Performance Tracker
          </h2>
          <div
            class="result-card grid grid-cols-1 md:grid-cols-3 gap-4 text-center mb-6"
          >
            <div>
              <h4 class="text-lg font-semibold text-main-secondary">Record</h4>
              <p
                id="tracker-record"
                class="text-2xl font-bold text-main-primary"
              >
                0 - 0
              </p>
            </div>
            <div>
              <h4 class="text-lg font-semibold text-main-secondary">
                Profit/Loss
              </h4>
              <p id="tracker-pl" class="text-2xl font-bold text-main-primary">
                $0.00
              </p>
            </div>
            <div>
              <h4 class="text-lg font-semibold text-main-secondary">ROI</h4>
              <p id="tracker-roi" class="text-2xl font-bold text-main-primary">
                0.00%
              </p>
            </div>
          </div>
          <div id="tracked-plays-list" class="space-y-4"></div>
        </div>

        <!-- System Performance Tracker View -->
        <div id="system-tracker-view" class="view hidden">
          <h2 class="text-2xl font-bold text-main-primary text-center mb-4">
            System Performance
          </h2>
          <div class="flex justify-center items-end gap-4 mb-6">
            <div class="input-group">
              <label
                for="system-sport-filter"
                class="text-main-secondary font-medium mb-1 block"
                >Sport:</label
              >
              <select id="system-sport-filter">
                <option value="all">All Sports</option>
              </select>
            </div>
            <div class="input-group">
              <label
                for="system-market-filter"
                class="text-main-secondary font-medium mb-1 block"
                >Market:</label
              >
              <select id="system-market-filter">
                <option value="all">All Markets</option>
                <option value="moneyline">Moneyline</option>
                <option value="spreads">Spreads</option>
                <option value="totals">Totals</option>
              </select>
            </div>
            <button id="simulate-results-btn" class="btn btn-primary">
              Simulate Results
            </button>
          </div>
          <div
            class="result-card grid grid-cols-1 md:grid-cols-3 gap-4 text-center mb-6"
          >
            <div>
              <h4 class="text-lg font-semibold text-main-secondary">Record</h4>
              <p
                id="system-tracker-record"
                class="text-2xl font-bold text-main-primary"
              >
                0 - 0
              </p>
            </div>
            <div>
              <h4 class="text-lg font-semibold text-main-secondary">
                Profit/Loss
              </h4>
              <p
                id="system-tracker-pl"
                class="text-2xl font-bold text-main-primary"
              >
                $0.00
              </p>
            </div>
            <div>
              <h4 class="text-lg font-semibold text-main-secondary">ROI</h4>
              <p
                id="system-tracker-roi"
                class="text-2xl font-bold text-main-primary"
              >
                0.00%
              </p>
            </div>
          </div>
          <div id="system-tracked-plays-list" class="space-y-4"></div>
        </div>
      </div>
    </div>

    <!-- Log Play Modal -->
    <div id="log-play-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="text-center mb-4">
          <h3
            class="text-lg leading-6 font-medium text-main-primary"
            id="modal-title"
          >
            Track Your Play
          </h3>
          <p id="modal-game-info" class="text-sm text-main-secondary"></p>
        </div>
        <div class="space-y-4">
          <div class="input-group">
            <label
              for="modal-selection"
              class="block text-sm font-medium text-main-secondary"
              >Selection</label
            >
            <select id="modal-selection"></select>
          </div>
          <div class="input-group">
            <label
              for="modal-odds"
              class="block text-sm font-medium text-main-secondary"
              >Odds</label
            >
            <input type="number" id="modal-odds" class="w-full" />
          </div>
          <div class="input-group">
            <label
              for="modal-stake"
              class="block text-sm font-medium text-main-secondary"
              >Stake ($)</label
            >
            <input type="number" id="modal-stake" class="w-full" />
          </div>
        </div>
        <div class="mt-6 flex justify-end space-x-4">
          <button id="modal-cancel-btn" type="button" class="btn btn-secondary">
            Cancel
          </button>
          <button id="modal-save-btn" type="button" class="btn btn-primary">
            Track Play
          </button>
        </div>
      </div>
    </div>

    <!-- Template for a tracked play card -->
    <template id="tracked-play-card-template">
      <div
        class="tracked-play-card bg-tertiary p-4 rounded-lg border border-border-primary"
      >
        <div class="flex justify-between items-start">
          <div>
            <p class="font-bold text-main-primary"></p>
            <p class="text-sm text-main-secondary"></p>
          </div>
          <div class="status-container text-right space-x-2"></div>
        </div>
        <div class="mt-2 text-sm">
          <p>Play: <span class="font-semibold play-details"></span></p>
          <p>Edge: <span class="font-semibold edge-details"></span></p>
        </div>
      </div>
    </template>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
